<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexiRAG</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #1a1a2e; padding: 16px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #2a2a4a; }
        .header h1 { font-size: 22px; color: #7c6af7; font-weight: 700; }
        .header span { font-size: 13px; color: #888; }
        .dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; margin-left: auto; }
        .main { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 280px; background: #13131f; border-right: 1px solid #2a2a4a; display: flex; flex-direction: column; padding: 16px; gap: 12px; }
        .sidebar h2 { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .upload-area { border: 2px dashed #2a2a4a; border-radius: 12px; padding: 24px 16px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .upload-area:hover { border-color: #7c6af7; background: #1a1a2e; }
        .upload-area input { display: none; }
        .upload-area .icon { font-size: 32px; margin-bottom: 8px; }
        .upload-area p { font-size: 13px; color: #888; }
        .upload-area p span { color: #7c6af7; font-weight: 600; }
        .upload-btn { background: #7c6af7; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: background 0.2s; }
        .upload-btn:hover { background: #6a58e0; }
        .upload-btn:disabled { background: #444; cursor: not-allowed; }
        .doc-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .doc-item { background: #1a1a2e; border-radius: 8px; padding: 10px 12px; font-size: 13px; color: #ccc; border-left: 3px solid #7c6af7; word-break: break-all; }
        .status { font-size: 12px; color: #4ade80; padding: 6px 10px; background: #0d2010; border-radius: 6px; display: none; }
        .status.error { color: #f87171; background: #200d0d; }
        .mode-selector { display: flex; gap: 6px; }
        .mode-btn { flex: 1; padding: 7px 4px; border: 1px solid #2a2a4a; border-radius: 8px; background: #1a1a2e; color: #888; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center; }
        .mode-btn:hover { border-color: #7c6af7; color: #ccc; }
        .mode-btn.active { background: #7c6af7; color: white; border-color: #7c6af7; }
        .chat { flex: 1; display: flex; flex-direction: column; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
        .message.user { background: #7c6af7; color: white; align-self: flex-end; border-radius: 12px 12px 2px 12px; }
        .message.bot { background: #1a1a2e; color: #e0e0e0; align-self: flex-start; border-radius: 12px 12px 12px 2px; }
        .message.bot .source { font-size: 11px; color: #666; margin-top: 8px; }
        .message.bot .mode-tag { font-size: 10px; color: #7c6af7; margin-bottom: 4px; }
        .cursor { display: inline-block; width: 2px; height: 14px; background: #7c6af7; margin-left: 2px; animation: blink 0.7s infinite; vertical-align: middle; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .welcome { text-align: center; margin: auto; color: #444; }
        .welcome h2 { font-size: 28px; color: #7c6af7; margin-bottom: 8px; }
        .welcome p { font-size: 14px; }
        .input-area { padding: 16px 20px; background: #13131f; border-top: 1px solid #2a2a4a; display: flex; gap: 10px; }
        .input-area input { flex: 1; background: #1a1a2e; border: 1px solid #2a2a4a; color: #e0e0e0; padding: 12px 16px; border-radius: 10px; font-size: 14px; outline: none; }
        .input-area input:focus { border-color: #7c6af7; }
        .input-area input::placeholder { color: #555; }
        .send-btn { background: #7c6af7; color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-size: 18px; transition: background 0.2s; }
        .send-btn:hover { background: #6a58e0; }
        .send-btn:disabled { background: #444; cursor: not-allowed; }
        @media (max-width: 600px) { .sidebar { width: 100%; max-height: 260px; } .main { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚡ LexiRAG</h1>
        <span>Local AI Document Assistant</span>
        <div class="dot"></div>
    </div>
    <div class="main">
        <div class="sidebar">
            <h2>AI Mode</h2>
            <div class="mode-selector">
                <div class="mode-btn active" onclick="setMode('ollama')" id="mode-ollama">🦙 Ollama</div>
                <div class="mode-btn" onclick="setMode('groq')" id="mode-groq">⚡ Groq</div>
                <div class="mode-btn" onclick="setMode('gemini')" id="mode-gemini">✨ Gemini</div>
            </div>
            <h2>Documents</h2>
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" accept=".pdf,.txt" onchange="handleFileSelect(event)">
                <div class="icon">📄</div>
                <p>Click to select a <span>PDF or TXT file</span></p>
            </div>
            <button class="upload-btn" id="uploadBtn" onclick="uploadFile()" disabled>Upload Document</button>
            <div class="status" id="status"></div>
            <h2>Uploaded</h2>
            <div class="doc-list" id="docList">
                <div style="font-size:12px;color:#555;">Loading...</div>
            </div>
        </div>
        <div class="chat">
            <div class="messages" id="messages">
                <div class="welcome">
                    <h2>LexiRAG</h2>
                    <p>Upload a PDF and start asking questions about it</p>
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="questionInput" placeholder="Ask a question about your document..." onkeydown="if(event.key==='Enter') sendQuestion()">
                <button class="send-btn" id="sendBtn" onclick="sendQuestion()">➤</button>
            </div>
        </div>
    </div>
    <script>
        const API = 'http://localhost:8000';
        let selectedFile = null;
        let currentMode = 'ollama';

        renderDocList();

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('mode-' + mode).classList.add('active');
        }

        function handleFileSelect(event) {
            selectedFile = event.target.files[0];
            if (selectedFile) {
                document.getElementById('uploadBtn').disabled = false;
                showStatus('Selected: ' + selectedFile.name, false);
            }
        }

        function showStatus(msg, isError) {
            const s = document.getElementById('status');
            s.textContent = msg;
            s.className = 'status' + (isError ? ' error' : '');
            s.style.display = 'block';
        }

        async function uploadFile() {
            if (!selectedFile) return;
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.textContent = 'Processing...';
            showStatus('Uploading and processing... please wait', false);

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const res = await fetch(API + '/upload', { method: 'POST', body: formData });
                const data = await res.json();
                showStatus('✓ ' + data.message, false);
                renderDocList();
                selectedFile = null;
                document.getElementById('fileInput').value = '';
            } catch (err) {
                showStatus('Upload failed. Is the server running?', true);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Upload Document';
            }
        }

        async function renderDocList() {
            const list = document.getElementById('docList');
            try {
                const res = await fetch(API + '/documents');
                const data = await res.json();
                if (data.documents.length === 0) {
                    list.innerHTML = '<div style="font-size:12px;color:#555;">No documents yet</div>';
                    return;
                }
                list.innerHTML = data.documents.map(function(d) {
                    return '<div class="doc-item" style="display:flex;justify-content:space-between;align-items:center;"><span>📄 ' + d + '</span><button onclick="deleteDoc(\'' + d + '\')" style="background:none;border:none;color:#f87171;cursor:pointer;font-size:16px;">🗑</button></div>';
                }).join('');
            } catch(e) {
                list.innerHTML = '<div style="font-size:12px;color:#555;">Could not load</div>';
            }
        }

        async function deleteDoc(docName) {
            if (!confirm('Delete ' + docName + '?')) return;
            await fetch(API + '/document/' + encodeURIComponent(docName), { method: 'DELETE' });
            renderDocList();
        }

        function addMessage(text, type) {
            const msgs = document.getElementById('messages');
            const welcome = msgs.querySelector('.welcome');
            if (welcome) welcome.remove();
            const div = document.createElement('div');
            div.className = 'message ' + type;
            if (text) div.innerHTML = text;
            msgs.appendChild(div);
            msgs.scrollTop = msgs.scrollHeight;
            return div;
        }

        const modeLabels = { ollama: '🦙 Ollama', groq: '⚡ Groq', gemini: '✨ Gemini' };

        async function sendQuestion() {
            const input = document.getElementById('questionInput');
            const question = input.value.trim();
            if (!question) return;

            input.value = '';
            document.getElementById('sendBtn').disabled = true;
            addMessage(question, 'user');

            const botMsg = addMessage('', 'bot');
            const modeTag = document.createElement('div');
            modeTag.className = 'mode-tag';
            modeTag.textContent = modeLabels[currentMode];
            botMsg.appendChild(modeTag);

            const cursor = document.createElement('span');
            cursor.className = 'cursor';
            botMsg.appendChild(cursor);

            try {
                const res = await fetch(API + '/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question, mode: currentMode })
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let sources = [];
                let buffer = '';

                while (true) {
                    const result = await reader.read();
                    if (result.done) break;
                    buffer += decoder.decode(result.value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (let i = 0; i < lines.length; i++) {
                        const line = lines[i];
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.slice(6));
                            if (data.type === 'sources') {
                                sources = data.sources;
                            } else if (data.type === 'token') {
                                cursor.remove();
                                botMsg.appendChild(document.createTextNode(data.text));
                                botMsg.appendChild(cursor);
                                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
                            } else if (data.type === 'done') {
                                cursor.remove();
                                if (sources.length > 0) {
                                    const src = document.createElement('div');
                                    src.className = 'source';
                                    src.innerHTML = '📚 ' + [...new Set(sources)].join(', ');
                                    botMsg.appendChild(src);
                                }
                            }
                        }
                    }
                }
            } catch (err) {
                botMsg.innerHTML = 'Error connecting to server.';
            }

            document.getElementById('sendBtn').disabled = false;
            input.focus();
        }
    </script>
</body>
</html>
